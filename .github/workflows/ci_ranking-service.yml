name: CI/CD - PuckZone Ranking

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/puckzone-ranking

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  compile:
    name: Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile -B --no-transfer-progress

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: compile

    # El test de contexto (@SpringBootTest) levanta JPA y necesita un Postgres.
    # Credenciales y nombre de BD coinciden con los defaults de application.yaml;
    # el puerto por defecto es 5434 (convención local), así que en CI se
    # sobreescribe con POSTGRES_PORT=5432 en el paso de tests.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: puckzone_ranking
          POSTGRES_USER: puckzone
          POSTGRES_PASSWORD: puckzone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test -B --no-transfer-progress
        env:
          POSTGRES_PORT: '5432'

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/target/surefire-reports/*.xml'
          check_name: 'Unit Test Results'
          comment_mode: always

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # La infraestructura (Container App incluida) la administra Terraform (infra/);
  # este job solo apunta la app a la imagen recien construida. Se despliega el tag
  # del SHA (no latest) para que cada push genere una revision nueva y se pueda
  # hacer rollback a un commit exacto.
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name puckzone-ranking \
            --resource-group puckzone-rg \
            --image ${{ env.IMAGE_NAME }}:${GITHUB_SHA::7}
