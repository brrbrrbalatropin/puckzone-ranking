name: CI/CD - PuckZone Ranking

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/puckzone-ranking

# Permisos del GITHUB_TOKEN por job (minimo privilegio): cada job declara
# solo lo que usa en vez de heredar permisos a nivel workflow.
jobs:
  compile:
    name: Compilation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile -B --no-transfer-progress

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: compile

    # checks/pull-requests: los necesita publish-unit-test-result-action para
    # crear el check "Unit Test Results" y comentar en los PRs.
    permissions:
      contents: read
      checks: write
      pull-requests: write

    # El test de contexto (@SpringBootTest) levanta JPA y necesita un Postgres.
    # Credenciales y nombre de BD coinciden con los defaults de application.yaml;
    # el puerto por defecto es 5434 (convención local), así que en CI se
    # sobreescribe con POSTGRES_PORT=5432 en el paso de tests.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: puckzone_ranking
          POSTGRES_USER: puckzone
          POSTGRES_PASSWORD: puckzone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test -B --no-transfer-progress
        env:
          POSTGRES_PORT: '5432'

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: always()
        with:
          files: '**/target/surefire-reports/*.xml'
          check_name: 'Unit Test Results'
          comment_mode: always

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # La infraestructura (Container App incluida) la administra Terraform (infra/);
  # este job solo apunta la app a la imagen recien construida. Se despliega el tag
  # del SHA (no latest) para que cada push genere una revision nueva y se pueda
  # hacer rollback a un commit exacto.
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    # No usa el GITHUB_TOKEN (azure/login autentica con AZURE_CREDENTIALS).
    permissions: {}

    steps:
      - name: Log in to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name puckzone-ranking \
            --resource-group puckzone-rg \
            --image ${{ env.IMAGE_NAME }}:${GITHUB_SHA::7}

  # Analisis estatico en SonarCloud, CI-based (no Automatic Analysis): con el
  # bytecode el analizador de Java detecta mas que solo con fuentes, y el
  # quality gate queda visible en el pipeline. Los tests ya corrieron en el
  # job test, aqui solo se compila (-DskipTests).
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Historia completa del repo: Sonar atribuye codigo nuevo vs viejo.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B --no-transfer-progress verify -DskipTests \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=brrbrrbalatropin_puckzone-ranking \
            -Dsonar.organization=brrbrrbalatropin \
            -Dsonar.host.url=https://sonarcloud.io
