# Los tests corren contra H2 en memoria emulando Postgres. Este archivo
# solo agrega/override propiedades: el application.yaml principal se sigue
# cargando (mismo patrón que en puckzone-game) y .properties gana empates.
spring.datasource.url=jdbc:h2:mem:ranking_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
